# ═══════════════════════════════════════════════════════════
# Nginx Reverse Proxy — Sistem Tempahan Bilik Media
# Letak di: /etc/nginx/sites-available/sistem-tempahan
# Aktifkan: ln -s /etc/nginx/sites-available/sistem-tempahan /etc/nginx/sites-enabled/
# Test     : sudo nginx -t
# Reload   : sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════

# ── HTTP (port 80) ─────────────────────────────────────────
# Kekalkan blok ini untuk Let's Encrypt challenge & auto-redirect
server {
    listen 80;
    listen [::]:80;

    # Tukar ke domain anda — contoh: tempahan.byzaifuan.com
    server_name tempahan.byzaifuan.com;

    # Untuk Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Auto-redirect ke HTTPS (selepas SSL dipasang)
    # Comment baris di bawah jika SSL belum dipasang
    location / {
        return 301 https://$host$request_uri;
    }

    # Kalau SSL belum dipasang, uncomment block di bawah untuk
    # proxy terus tanpa HTTPS:
    #
    # location / {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

# ── HTTPS (port 443) ───────────────────────────────────────
# Aktifkan selepas: sudo certbot --nginx -d tempahan.byzaifuan.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name tempahan.byzaifuan.com;

    # Path SSL — certbot akan auto-isi
    ssl_certificate     /etc/letsencrypt/live/tempahan.byzaifuan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tempahan.byzaifuan.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Saiz body untuk upload (cth: import excel)
    client_max_body_size 20M;

    # ── Static assets (CSS/JS/images) ─────────────────────
    # Cache 1 hari untuk asset
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # ── API & semua route lain ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # No buffering for SSE / streaming
        proxy_buffering off;
    }

    # ── Logging ──────────────────────────────────────────
    access_log /var/log/nginx/sistem-tempahan-access.log;
    error_log  /var/log/nginx/sistem-tempahan-error.log;
}
